<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍳</text></svg>">
</head>
<body>

  <header class="site-header">
    <div class="site-wrap">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}<span></span></a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Recipes</a>
        <a href="{{ '/about/' | relative_url }}" {% if page.url contains 'about' %}class="active"{% endif %}>About</a>
      </nav>
    </div>
  </header>

  <main class="site-wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="site-wrap">
      {{ site.title }} &nbsp;·&nbsp; A personal cookbook
    </div>
  </footer>

</body>
</html>
